<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Monkeys typing Shakespeare</title>
  <link rel="stylesheet" href="./CSS/styles.css">
</head>
<body>
  <h1>Monkeys typing Shakespeare</h1>
  <div id="left">
    <h2>Live monkeys:</h2>
    <div id="output"></div>
  </div>
  <div id="right">
    <div id="stats">
      <h2>Stats:</h2>
      <p>Uptime: </p><p id="uptime"></p>
      <p>Characters typed: </p><p id="totalChars"></p>
      <p>Longest match: </p><p id="longestLength"></p>
      <p id="longestText"></p>
    </div>
  </div>



  <script src="./JS/app.js" type="module"></script>
</body>
</html>
